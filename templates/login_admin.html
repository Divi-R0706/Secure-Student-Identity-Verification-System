{% extends "base_public.html" %}
{% block content %}
<div class="auth-shell">
    <div class="auth-grid auth-grid-spaced">
        <section class="auth-card">
            <div class="auth-card-brand">
                <img class="brand-logo-image auth-logo-image" src="{{ url_for('static', filename='logo.png') }}" alt="IDENZA logo">
                <div class="auth-logo-wordmark">IDENZA</div>
                <div class="auth-panel-subtitle">{{ _("Administrative access") if mode == "admin" else _("Super admin control center") }}</div>
            </div>
            {% if error %}<div class="error-text">{{ error }}</div>{% endif %}
            <form method="post" class="auth-form-stack">
                <div class="field"><label class="form-label">{{ _("Email") }}</label><div class="field-wrap has-left-icon"><svg class="field-icon-left" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><input class="input form-input" type="email" name="email" placeholder="{{ _('Email') }}" required></div></div>
                <div class="field"><label class="form-label">{{ _("Password") }}</label><div class="field-wrap has-left-icon"><svg class="field-icon-left" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><input class="input form-input" type="password" name="password" placeholder="{{ _('Password') }}" required><button type="button" class="eye-toggle" onclick="togglePwd(this)" tabindex="-1" aria-label="Toggle password visibility"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
                <div class="auth-form-actions"><button class="primary-btn btn-primary" type="submit">{{ _("Admin Login") if mode == "admin" else _("Super Admin Login") }}</button></div>
            </form>
            <div class="auth-links auth-links-start">
                <a href="{{ url_for('admin_forgot_password' if mode == 'admin' else 'superadmin_forgot_password') }}">{{ _("Forgot password?") }}</a>
            </div>
        </section>
    </div>
</div>
{% endblock %}
