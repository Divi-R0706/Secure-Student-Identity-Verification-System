<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef8f2"/>
      <stop offset="55%" stop-color="#f8fbf9"/>
      <stop offset="100%" stop-color="#edf5ef"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b8d57"/>
      <stop offset="100%" stop-color="#0f6c42"/>
    </linearGradient>
    <linearGradient id="softGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3f5eb"/>
      <stop offset="100%" stop-color="#f5fbf7"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#224735" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 54px "Segoe UI", Arial, sans-serif; fill: #163b2b; }
      .sub { font: 400 24px "Segoe UI", Arial, sans-serif; fill: #5d7569; }
      .section { font: 700 24px "Segoe UI", Arial, sans-serif; fill: #174233; letter-spacing: .2px; }
      .cardTitle { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #173a2c; }
      .cardText { font: 400 20px "Segoe UI", Arial, sans-serif; fill: #567064; }
      .mini { font: 600 18px "Segoe UI", Arial, sans-serif; fill: #1b8d57; }
      .step { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .stepText { font: 600 18px "Segoe UI", Arial, sans-serif; fill: #163b2b; }
      .foot { font: 600 16px "Segoe UI", Arial, sans-serif; fill: #5d7569; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1400" cy="110" r="180" fill="#dff1e7" opacity="0.65"/>
  <circle cx="180" cy="820" r="150" fill="#dff1e7" opacity="0.55"/>

  <g transform="translate(80 58)">
    <rect x="0" y="0" rx="32" ry="32" width="1440" height="784" fill="#ffffff" filter="url(#shadow)"/>

    <text x="60" y="78" class="title">Secure Student Identity Verification System</text>
    <text x="60" y="124" class="sub">A Flask + SQLite platform for student records, document review, QR verification, and audit-ready access control.</text>

    <!-- left card -->
    <g transform="translate(60 180)">
      <rect width="405" height="500" rx="30" fill="url(#softGreen)" stroke="#cbe5d6"/>
      <circle cx="84" cy="86" r="34" fill="url(#accent)"/>
      <text x="84" y="94" text-anchor="middle" class="step">S</text>
      <text x="132" y="80" class="cardTitle">Student Portal</text>
      <text x="132" y="114" class="cardText">Login, dashboard, uploads, tasks,</text>
      <text x="132" y="144" class="cardText">QR identity card, and recent activity.</text>

      <g transform="translate(34 190)">
        <rect width="338" height="64" rx="18" fill="#ffffff" stroke="#d8e8df"/>
        <text x="24" y="40" class="stepText">1. Secure login with OTP</text>
      </g>
      <g transform="translate(34 270)">
        <rect width="338" height="64" rx="18" fill="#ffffff" stroke="#d8e8df"/>
        <text x="24" y="40" class="stepText">2. Upload documents</text>
      </g>
      <g transform="translate(34 350)">
        <rect width="338" height="64" rx="18" fill="#ffffff" stroke="#d8e8df"/>
        <text x="24" y="40" class="stepText">3. View verification status</text>
      </g>
      <g transform="translate(34 430)">
        <rect width="338" height="64" rx="18" fill="#ffffff" stroke="#d8e8df"/>
        <text x="24" y="40" class="stepText">4. Open QR ID card</text>
      </g>
    </g>

    <!-- middle flow -->
    <g transform="translate(507 180)">
      <rect width="372" height="500" rx="30" fill="#ffffff" stroke="#dbe8e0"/>
      <text x="34" y="54" class="section">Verification Flow</text>

      <g transform="translate(30 94)">
        <circle cx="48" cy="48" r="48" fill="#e4f4ea"/>
        <text x="48" y="54" text-anchor="middle" class="cardTitle" font-size="26">01</text>
        <text x="118" y="42" class="cardTitle" font-size="22">Upload</text>
        <text x="118" y="72" class="cardText">Student submits documents</text>
      </g>

      <g transform="translate(30 196)">
        <circle cx="48" cy="48" r="48" fill="#dff1e7"/>
        <text x="48" y="54" text-anchor="middle" class="cardTitle" font-size="26">02</text>
        <text x="118" y="42" class="cardTitle" font-size="22">Review</text>
        <text x="118" y="72" class="cardText">Admin approves or rejects</text>
      </g>

      <g transform="translate(30 298)">
        <circle cx="48" cy="48" r="48" fill="#d7ebdf"/>
        <text x="48" y="54" text-anchor="middle" class="cardTitle" font-size="26">03</text>
        <text x="118" y="42" class="cardTitle" font-size="22">Verify</text>
        <text x="118" y="72" class="cardText">Public QR page confirms identity</text>
      </g>

      <g transform="translate(30 400)">
        <circle cx="48" cy="48" r="48" fill="#d0e6d7"/>
        <text x="48" y="54" text-anchor="middle" class="cardTitle" font-size="26">04</text>
        <text x="118" y="42" class="cardTitle" font-size="22">Log</text>
        <text x="118" y="72" class="cardText">Events stored for audit and scan history</text>
      </g>
    </g>

    <!-- right card -->
    <g transform="translate(917 180)">
      <rect width="463" height="500" rx="30" fill="url(#softGreen)" stroke="#cbe5d6"/>
      <text x="34" y="54" class="section">Core Advantages</text>

      <g transform="translate(34 96)">
        <rect width="395" height="74" rx="20" fill="#ffffff" stroke="#d8e8df"/>
        <text x="26" y="33" class="mini">SHA-256 file integrity</text>
        <text x="26" y="56" class="cardText" font-size="17">Detects tampering after upload</text>
      </g>
      <g transform="translate(34 186)">
        <rect width="395" height="74" rx="20" fill="#ffffff" stroke="#d8e8df"/>
        <text x="26" y="33" class="mini">Time-limited QR tokens</text>
        <text x="26" y="56" class="cardText" font-size="17">Public links expire and can be refreshed</text>
      </g>
      <g transform="translate(34 276)">
        <rect width="395" height="74" rx="20" fill="#ffffff" stroke="#d8e8df"/>
        <text x="26" y="33" class="mini">Login lockout + session timeout</text>
        <text x="26" y="56" class="cardText" font-size="17">Improves access security</text>
      </g>
      <g transform="translate(34 366)">
        <rect width="395" height="74" rx="20" fill="#ffffff" stroke="#d8e8df"/>
        <text x="26" y="33" class="mini">Audit and scan logs</text>
        <text x="26" y="56" class="cardText" font-size="17">Tracks admin actions and public scans</text>
      </g>
    </g>

    <text x="60" y="732" class="foot">Roles: Student • Admin • Super Admin   |   UI: Bootstrap 5 + Jinja2   |   Storage: SQLite</text>
  </g>
</svg>
