<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5fbf8"/>
      <stop offset="100%" stop-color="#eef7f1"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b8d57"/>
      <stop offset="100%" stop-color="#0f6c42"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#234735" flood-opacity="0.12"/>
    </filter>
    <style>
      .h1{font:800 48px "Segoe UI",Arial,sans-serif;fill:#163b2b}
      .p{font:400 20px "Segoe UI",Arial,sans-serif;fill:#5d7569}
      .n{font:800 24px "Segoe UI",Arial,sans-serif;fill:#ffffff}
      .t{font:700 22px "Segoe UI",Arial,sans-serif;fill:#163b2b}
      .d{font:400 18px "Segoe UI",Arial,sans-serif;fill:#5d7569}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(64 52)">
    <text x="0" y="56" class="h1">Student Verification Workflow</text>
    <text x="0" y="92" class="p">A secure end-to-end process from login to public QR verification, with logging and admin review.</text>

    <g transform="translate(0 160)">
      <rect width="1472" height="620" rx="30" fill="#ffffff" filter="url(#shadow)"/>
      <g transform="translate(54 96)">
        <rect width="220" height="200" rx="28" fill="#eaf7ee" stroke="#cde4d7"/>
        <circle cx="110" cy="54" r="34" fill="url(#g)"/>
        <text x="110" y="62" text-anchor="middle" class="n">1</text>
        <text x="24" y="122" class="t">Login</text>
        <text x="24" y="152" class="d">OTP or password access</text>
      </g>
      <g transform="translate(332 96)">
        <rect width="220" height="200" rx="28" fill="#eaf7ee" stroke="#cde4d7"/>
        <circle cx="110" cy="54" r="34" fill="url(#g)"/>
        <text x="110" y="62" text-anchor="middle" class="n">2</text>
        <text x="24" y="122" class="t">Upload</text>
        <text x="24" y="152" class="d">Student submits documents</text>
      </g>
      <g transform="translate(610 96)">
        <rect width="220" height="200" rx="28" fill="#eaf7ee" stroke="#cde4d7"/>
        <circle cx="110" cy="54" r="34" fill="url(#g)"/>
        <text x="110" y="62" text-anchor="middle" class="n">3</text>
        <text x="24" y="122" class="t">Tamper Check</text>
        <text x="24" y="152" class="d">SHA-256 integrity validation</text>
      </g>
      <g transform="translate(888 96)">
        <rect width="220" height="200" rx="28" fill="#eaf7ee" stroke="#cde4d7"/>
        <circle cx="110" cy="54" r="34" fill="url(#g)"/>
        <text x="110" y="62" text-anchor="middle" class="n">4</text>
        <text x="24" y="122" class="t">Admin Review</text>
        <text x="24" y="152" class="d">Approve / reject with reason</text>
      </g>
      <g transform="translate(1166 96)">
        <rect width="220" height="200" rx="28" fill="#eaf7ee" stroke="#cde4d7"/>
        <circle cx="110" cy="54" r="34" fill="url(#g)"/>
        <text x="110" y="62" text-anchor="middle" class="n">5</text>
        <text x="24" y="122" class="t">QR Verify</text>
        <text x="24" y="152" class="d">Public verification page</text>
      </g>

      <g transform="translate(164 318)">
        <path d="M0 0 H190" stroke="#1b8d57" stroke-width="6" stroke-linecap="round"/>
        <path d="M190 0 l-18 -10 l4 10 l-4 10 z" fill="#1b8d57"/>
      </g>
      <g transform="translate(442 318)">
        <path d="M0 0 H190" stroke="#1b8d57" stroke-width="6" stroke-linecap="round"/>
        <path d="M190 0 l-18 -10 l4 10 l-4 10 z" fill="#1b8d57"/>
      </g>
      <g transform="translate(720 318)">
        <path d="M0 0 H190" stroke="#1b8d57" stroke-width="6" stroke-linecap="round"/>
        <path d="M190 0 l-18 -10 l4 10 l-4 10 z" fill="#1b8d57"/>
      </g>
      <g transform="translate(998 318)">
        <path d="M0 0 H190" stroke="#1b8d57" stroke-width="6" stroke-linecap="round"/>
        <path d="M190 0 l-18 -10 l4 10 l-4 10 z" fill="#1b8d57"/>
      </g>

      <g transform="translate(178 394)">
        <rect width="1116" height="120" rx="28" fill="#f7fcf9" stroke="#dbe8e0"/>
        <text x="36" y="48" class="t">Outputs and safeguards</text>
        <text x="36" y="80" class="d">Audit logs, scan history, login logs, time-limited QR tokens, and role-based access control.</text>
      </g>
    </g>
  </g>
</svg>
